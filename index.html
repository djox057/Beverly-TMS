  <!-- Inline critical CSS for instant loading state -->
  <style>
    #initial-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: hsl(222.2 84% 4.9%);
      z-index: 9999;
    }
    #initial-loader-content {
      text-align: center;
      color: hsl(210 40% 98%);
    }
    #initial-loader-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid hsl(217.2 32.6% 17.5%);
      border-top-color: hsl(210 40% 98%);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .initial-loader-text {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

  <body>
    <!-- Immediate loading state for better FCP -->
    <div id="initial-loader">
      <div id="initial-loader-content">
        <div id="initial-loader-spinner"></div>
        <div class="initial-loader-text">Loading Beverly TMS...</div>
      </div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Remove initial loader once React app mounts -->
    <script>
      window.addEventListener('DOMContentLoaded', function() {
        setTimeout(function() {
          var loader = document.getElementById('initial-loader');
          if (loader && document.getElementById('root').children.length > 0) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s';
            setTimeout(function() { loader.remove(); }, 300);
          }
        }, 100);
      });
    </script>
  </body>
